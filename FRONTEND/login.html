<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Hospedaje Digital</title>
    
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        body {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-family);
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 8px;
        }

        .login-subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ffffff;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
        }

        .error-message {
            display: none;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            background-color: #fee;
            color: #c33;
            border: 1px solid #fcc;
            font-size: 13px;
        }

        .error-message.show {
            display: block;
        }

        .error-message a {
            color: #c33;
            font-weight: bold;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .login-footer {
            text-align: center;
            font-size: 13px;
            color: #666;
            margin-top: 20px;
        }

        .login-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1 class="login-title">Hospedaje Digital</h1>
        <p class="login-subtitle">Ingresa a tu cuenta</p>

        <form id="loginForm">
            <div id="errorMessage" class="error-message"></div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" required placeholder="correo@ejemplo.com">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="Tu contraseña">
            </div>

            <button type="submit" class="btn-submit">Iniciar Sesión</button>
        </form>

        <div class="login-footer">
            <p>¿No tienes cuenta? <a href="pages/register.html">Regístrate aquí</a></p>
            <p style="margin-top: 10px;"><a href="pages/recuperarpass.html">🔐 ¿Olvidaste tu contraseña?</a></p>
            <p style="margin-top: 10px;"><a href="landingPage.html">← Volver</a></p>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const loginForm = document.getElementById("loginForm");
            const errorContainer = document.getElementById("errorMessage");

            if (loginForm) {
                loginForm.addEventListener("submit", async (e) => {
                    e.preventDefault();

                    errorContainer.classList.remove("show");
                    errorContainer.innerHTML = "";

                    const email = document.getElementById("email").value;
                    const contrasena = document.getElementById("password").value;

                    const result = await loginUsuario(email, contrasena);

                    if (result.success) {
                        window.location.href = "index.html";
                    } else {
                        errorContainer.classList.add("show");
                        errorContainer.textContent = result.message;
                    }
                });
            }
        });
    </script>
</body>
</html>
