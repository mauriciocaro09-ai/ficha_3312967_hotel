<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Hospedaje Digital</title>
    
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/styles.css">
    
    <style>
        body {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 600px;
        }

        .register-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .register-subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-section {
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid #eee;
        }

        .form-section:last-of-type {
            border-bottom: none;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 15px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-grid.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #ffffff;
            font-weight: 500;
            font-size: 13px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
        }

        .required {
            color: #d32f2f;
        }

        .error-message {
            display: none;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            background-color: #fee;
            color: #c33;
            border: 1px solid #fcc;
            font-size: 13px;
        }

        .error-message.show {
            display: block;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .register-footer {
            text-align: center;
            font-size: 13px;
            color: #666;
            margin-top: 20px;
        }

        .register-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .register-container {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1 class="register-title">Crear Cuenta</h1>
        <p class="register-subtitle">Completa tus datos para registrarte en el sistema</p>

        <form id="registerForm">
            <div id="registerError" class="error-message"></div>

            <!-- Sección 1: Documento -->
            <div class="form-section">
                <h3 class="section-title">📋 Información de Documento</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="reg_tipoDoc">Tipo Documento <span class="required">*</span></label>
                        <select id="reg_tipoDoc" required>
                            <option value="">Selecciona un tipo</option>
                            <option value="CC">Cédula de Ciudadanía</option>
                            <option value="TI">Tarjeta de Identidad</option>
                            <option value="CE">Cédula de Extranjería</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="reg_numDoc">Número Documento <span class="required">*</span></label>
                        <input type="number" id="reg_numDoc" required>
                    </div>
                </div>
            </div>

            <!-- Sección 2: Datos de Contacto -->
            <div class="form-section">
                <h3 class="section-title">📱 Datos de Contacto</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="reg_nombre">Nombre <span class="required">*</span></label>
                        <input type="text" id="reg_nombre" required>
                    </div>
                    <div class="form-group">
                        <label for="reg_apellido">Apellido <span class="required">*</span></label>
                        <input type="text" id="reg_apellido" required>
                    </div>
                    <div class="form-group">
                        <label for="reg_telefono">Teléfono</label>
                        <input type="text" id="reg_telefono">
                    </div>
                    <div class="form-group">
                        <label for="reg_pais">País</label>
                        <input type="text" id="reg_pais">
                    </div>
                    <div class="form-group full">
                        <label for="reg_direccion">Dirección</label>
                        <input type="text" id="reg_direccion">
                    </div>
                </div>
            </div>

            <!-- Sección 3: Credenciales -->
            <div class="form-section">
                <h3 class="section-title">🔐 Credenciales de Acceso</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="reg_email">Correo Electrónico <span class="required">*</span></label>
                        <input type="email" id="reg_email" required>
                    </div>
                    <div class="form-group">
                        <label for="reg_password">Contraseña <span class="required">*</span></label>
                        <input type="password" id="reg_password" required>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-submit">Registrarse</button>
        </form>

        <div class="register-footer">
            <p>¿Ya tienes cuenta? <a href="../login.html">Inicia sesión</a></p>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const registerForm = document.getElementById("registerForm");
            const registerError = document.getElementById("registerError");

            if (registerForm) {
                registerForm.addEventListener("submit", async (e) => {
                    e.preventDefault();

                    registerError.classList.remove("show");
                    registerError.textContent = "";

                    const nombre = document.getElementById("reg_nombre").value.trim();
                    const apellido = document.getElementById("reg_apellido").value.trim();
                    const password = document.getElementById("reg_password").value.trim();
                    const email = document.getElementById("reg_email").value.trim();
                    const tipoDoc = document.getElementById("reg_tipoDoc").value.trim();
                    const numDoc = document.getElementById("reg_numDoc").value.trim();

                    if (!nombre || !apellido || !password || !email || !tipoDoc || !numDoc) {
                        registerError.classList.add("show");
                        registerError.textContent = "Por favor, completa todos los campos obligatorios (marcados con *)";
                        return;
                    }

                    const userData = {
                        Contrasena: password,
                        Nombre: nombre,
                        Apellido: apellido,
                        Email: email,
                        TipoDocumento: tipoDoc,
                        NumeroDocumento: numDoc,
                        Telefono: document.getElementById("reg_telefono").value.trim() || null,
                        Pais: document.getElementById("reg_pais").value.trim() || null,
                        Direccion: document.getElementById("reg_direccion").value.trim() || null,
                        IDRol: 2,
                    };

                    const result = await registrarUsuario(userData);

                    if (result.success) {
                        registerError.classList.remove("show");
                        alert("¡Registro exitoso! Redirigiendo a login...");
                        window.location.href = "../login.html";
                    } else {
                        registerError.classList.add("show");
                        registerError.textContent = result.message;
                    }
                });
            }
        });
    </script>
</body>
</html>
