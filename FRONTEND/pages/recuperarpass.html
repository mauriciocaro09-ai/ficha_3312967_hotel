<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Hospedaje Digital</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/variables.css">
    
    <style>
        /* Estados de visibilidad y estilos específicos de input */
        .recovery-step { display: none; }
        .recovery-step.active { display: block; }
        
        .code-input {
            letter-spacing: 0.5em;
            text-align: center;
            font-family: 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', monospace;
        }

        /* Estilos para los mensajes dinámicos */
        .message { display: none; padding: 1rem; border-radius: 0.75rem; font-size: 0.875rem; margin-bottom: 1rem; border-left-width: 4px; }
        .message.success { display: block; background-color: #f0fdf4; color: #166534; border-color: #22c55e; }
        .message.error { display: block; background-color: #fef2f2; color: #991b1b; border-color: #ef4444; }
        .message.info { display: block; background-color: #eff6ff; color: #1e40af; border-color: #3b82f6; }
    </style>
</head>
<body class="bg-slate-950 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-100">
        
        <div class="p-8 md:p-10">
            <!-- HEADER -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-orange-100 text-orange-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-6 shadow-sm">
                    <i class="fa-solid fa-key"></i>
                </div>
                <h1 class="text-2xl font-extrabold text-slate-900 mb-2">¿Olvidaste tu contraseña?</h1>
                <p id="stepDescription" class="text-slate-500 text-sm leading-relaxed">
                    Ingresa tu correo para comenzar el proceso de recuperación.
                </p>
            </div>

            <!-- PASO 1: Solicitar Código -->
            <div id="step1" class="recovery-step active">
                <form id="step1Form" class="space-y-5">
                    <div id="step1Message" class="message"></div>

                    <div class="space-y-2">
                        <label for="email1" class="block text-sm font-bold text-slate-700">Correo Electrónico</label>
                        <input type="email" id="email1" name="email" required placeholder="ejemplo@correo.com"
                            class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-orange-500/10 focus:border-orange-500 outline-none transition-all">
                    </div>

                    <button type="submit" id="step1Btn" 
                        class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-orange-200 transition-all flex items-center justify-center gap-2">
                        Enviar Código <i class="fa-solid fa-paper-plane text-xs"></i>
                    </button>
                </form>
            </div>

            <!-- PASO 2: Ingresar Código -->
            <div id="step2" class="recovery-step">
                <form id="step2Form" class="space-y-5">
                    <div id="step2Message" class="message"></div>

                    <div class="space-y-2 text-center">
                        <label for="code" class="block text-sm font-bold text-slate-700 mb-1">Código de 6 dígitos</label>
                        <input type="text" id="code" name="code" maxlength="6" required placeholder="000000" 
                            class="code-input w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-xl text-2xl font-bold focus:border-green-500 focus:ring-4 focus:ring-green-500/10 outline-none transition-all">
                    </div>

                    <div class="flex gap-3">
                        <button type="button" id="step2Back" 
                            class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3.5 rounded-xl transition-all">
                            Atrás
                        </button>
                        <button type="submit" id="step2Btn" 
                            class="flex-[2] bg-green-600 hover:bg-green-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-green-100 transition-all">
                            Verificar Código
                        </button>
                    </div>
                </form>
            </div>

            <!-- PASO 3: Cambiar Contraseña -->
            <div id="step3" class="recovery-step">
                <form id="step3Form" class="space-y-5">
                    <div id="step3Message" class="message"></div>

                    <div class="space-y-2">
                        <label for="newPassword" class="block text-sm font-bold text-slate-700">Nueva Contraseña</label>
                        <input type="password" id="newPassword" name="newPassword" required minlength="6" placeholder="Mínimo 6 caracteres"
                            class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-green-500/10 focus:border-green-500 outline-none transition-all">
                    </div>

                    <div class="space-y-2">
                        <label for="confirmPassword" class="block text-sm font-bold text-slate-700">Confirmar Contraseña</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6" placeholder="Repite tu contraseña"
                            class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-green-500/10 focus:border-green-500 outline-none transition-all">
                    </div>

                    <div class="flex gap-3 pt-2">
                        <button type="button" id="step3Back" 
                            class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3.5 rounded-xl transition-all">
                            Atrás
                        </button>
                        <button type="submit" id="step3Btn" 
                            class="flex-[2] bg-orange-500 hover:bg-orange-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-orange-200 transition-all">
                            Cambiar Contraseña
                        </button>
                    </div>
                </form>
            </div>

            <!-- ENLACE DE VUELTA -->
            <div class="mt-10 pt-6 border-t border-slate-100 text-center">
                <a href="../login.html" class="text-orange-500 hover:text-orange-600 font-bold text-sm transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-arrow-left text-xs"></i> Volver al inicio de sesión
                </a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/passwordRecovery.js"></script>
</body>
</html>
